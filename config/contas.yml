# Conceitos lógicos -> como localizá-los nas demonstrações da CVM (ITR/DFP), que vêm em
# formato long-format (uma linha por conta: CD_CONTA / DS_CONTA / VL_CONTA).
#
# Por que NÃO fixamos o CD_CONTA: ele varia entre o plano de contas financeiro e o
# não-financeiro (ex.: dividendos pagos = 6.03.05/06 na Petrobras, 6.03.07/08 no Itaú) e
# uma empresa pode ter várias linhas do mesmo conceito. Em vez de código fixo, casamos por
# SEÇÃO (prefixo do CD_CONTA, estável) + PALAVRAS na DS_CONTA, e SOMAMOS as linhas que
# batem. Resiliente aos dois planos. SEMPRE validar com scripts/inspect_dfp.py.
#
# `statement` = sufixo do membro no ZIP (DFC_MI, DRE, DMPL, ...); o parser prefere o
# consolidado (_con) e cai para o individual (_ind). `absolute` = tomar |valor| (saídas de
# caixa vêm negativas). Match de DS é case/acento-insensível.

proventos_pagos:            # numerador do DY — dividendos + JCP PAGOS no período (caixa)
  statement: DFC_MI
  section_prefix: "6.03"    # atividades de financiamento
  # "provento" cobre "Pagamento de Proventos" (B3 usa isso, não "Dividendos"); dentro da
  # seção de financiamento + exclude "recebido" é seguro. Validado: B3 2025 R$ 1,44bi.
  ds_includes: ["dividendo", "juros sobre o capital", "juros sobre capital", "provento"]
  # exclui dividendos RECEBIDOS (6.02, operacional) e os pagos a acionistas NÃO
  # controladores (são das controladas; queremos só o que foi pago aos acionistas da
  # própria empresa). Validado: Petrobras 6.03.05+06, Itaú 6.03.07+08, Vale 6.03.04.
  ds_excludes: ["recebido", "nao controlador"]
  absolute: true

# Lucro líquido (denominador do payout). O número correto é o ATRIBUÍDO À CONTROLADORA,
# não o consolidado total (que inclui minoritários). A DS_CONTA é idêntica nos dois planos
# mesmo com código diferente — banco: 3.09.01, não-financeira: 3.11.01 — por isso casamos
# por descrição. fundamentos.lucro_liquido() prefere a controladora e cai no consolidado
# (3.09/3.11) só para empresas sem a abertura. Validado 2025: Petrobras 110,1bi (consol.
# 110,6), Itaú 44,86bi, Vale 13,81bi (consol. 11,8 — minoritário negativo!), Ambev 15,5bi.
lucro_controladora:
  statement: DRE
  section_prefix: "3"
  # substring estável: casa "a Sócios" e "aos Sócios da Empresa Controladora" (BB usa "aos").
  ds_includes: ["socios da empresa controladora", "acionistas controladores"]
  ds_excludes: ["nao control"]
  absolute: false

lucro_consolidado:          # fallback quando não há abertura por controladora/minoritário
  statement: DRE
  section_prefix: "3"
  # casa "Lucro/Prejuízo Consolidado do Período" e "Lucro ou Prejuízo Líquido Consolidado
  # do Período" (BB). Exclui as aberturas (atribuído) e linhas por ação/descontinuadas.
  ds_includes: ["consolidado do periodo"]
  ds_excludes: ["atribuido", "nao control", "operacoes descontinuadas", "por acao"]
  absolute: false

# Patrimônio líquido (book value) -> VPA e P/VP. Mesmo padrão controladora>consolidado do
# lucro. No BPP o código varia (Petrobras 2.03, Itaú 2.08, BB 2.07). Validado 2025:
# BB controladora 189,2bi (consol. 193,6); Petrobras/Itaú sem abertura -> consolidado.
pl_controladora:
  statement: BPP
  section_prefix: "2"
  ds_includes: ["patrimonio liquido atribuido ao control", "atribuido ao controlador", "atribuido aos socios control"]
  ds_excludes: ["nao control", "ajustes"]
  absolute: false

pl_consolidado:
  statement: BPP
  section_prefix: "2"
  ds_includes: ["patrimonio liquido consolidado"]
  ds_excludes: ["atribuido", "nao control", "ajustes"]
  absolute: false

# Alavancagem (dívida líquida / EBITDA) — só faz sentido em NÃO-financeira. Em banco, as
# linhas abaixo simplesmente não existem (funding é depósito, não dívida; não há EBIT
# operacional) -> o conceito sai vazio e o consumidor marca N/A. max_dots=2 pega só as
# linhas-mãe da dívida (2.01.04, 2.02.01), evitando somar as filhas. Validado 2025:
# Petrobras dívida bruta R$ 384bi, caixa 35,6bi, EBIT 145,6bi, D&A 84,4bi.
divida_bruta:
  statement: BPP
  section_prefix: "2"
  ds_includes: ["emprestimos e financiamentos"]
  ds_excludes: []
  absolute: true
  max_dots: 2

caixa_equivalentes:
  statement: BPA
  section_prefix: "1"
  ds_includes: ["caixa e equivalentes de caixa"]
  ds_excludes: []
  absolute: true

ebit:                       # Resultado Antes do Resultado Financeiro e dos Tributos
  statement: DRE
  section_prefix: "3"
  ds_includes: ["antes do resultado financeiro"]
  ds_excludes: []
  absolute: false

depreciacao_amortizacao:    # addback de D&A na DFC operacional (não confundir com 6.03)
  statement: DFC_MI
  section_prefix: "6.01"
  ds_includes: ["deprecia"]
  ds_excludes: []
  absolute: true
