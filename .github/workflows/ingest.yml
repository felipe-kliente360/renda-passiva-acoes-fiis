name: Ingestão de fundamentos (mensal)

# Fundamentos da CVM mudam mensal/trimestralmente. Cron mensal + disparo manual.
on:
  schedule:
    - cron: "0 6 5 * *" # dia 5 de cada mês, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest-fii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar e ingerir informe mensal de FII
        run: python scripts/ingest_fii.py --download --out data/fii_vp

      - name: Commitar artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fii_vp.json data/fii_vp.parquet
          if git diff --staged --quiet; then
            echo "Sem mudanças nos artefatos."
          else
            git commit -m "chore(data): atualiza VP de FII (ingestão mensal)"
            git push
          fi
