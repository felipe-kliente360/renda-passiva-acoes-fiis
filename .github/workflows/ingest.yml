name: Ingestão de fundamentos (mensal)

# Fundamentos da CVM mudam mensal/trimestralmente. Cron mensal + disparo manual.
on:
  schedule:
    - cron: "0 6 5 * *" # dia 5 de cada mês, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest-fii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Contexto macro (BCB/SGS — Selic/CDI/IPCA, p/ spread)
        run: python scripts/fetch_macro.py --out data/macro.json

      - name: Baixar e ingerir informe mensal de FII (VP da cota)
        run: python scripts/ingest_fii.py --download --out data/fii_vp

      - name: DY de FII (rendimentos via INF_MENSAL)
        run: python scripts/ingest_fii_dy.py --start 2020 --end "$(date -u +%Y)" --out data/fii_dy

      - name: Vacância de FII de tijolo (FNET — Informe Trimestral)
        run: python scripts/ingest_fii_vacancia.py --out data/fii_vacancia.json
        continue-on-error: true   # FNET é instável; não derruba o pipeline

      - name: FII estilo-ações (DY + projeção + saúde + score)
        run: python scripts/ingest_fii_fundos.py --start 2020 --end "$(date -u +%Y)" --out data/fii_fundos

      - name: FIAgro (shortlist auto-detectada via brapi ∩ CVM)
        run: python scripts/ingest_fiagro.py --out data/fiagro

      - name: Fatos relevantes da watchlist (IPE-RAD)
        run: python scripts/ingest_ipe.py --start 2025 --end "$(date -u +%Y)" --out data/fatos_relevantes

      - name: Commitar artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fii_vp.json data/fii_vp.parquet data/fii_dy.json data/fii_dy.parquet \
                  data/fii_fundos.json data/fii_fundos.parquet \
                  data/fii_score.json data/fii_score.parquet \
                  data/fiagro.json data/fiagro.parquet \
                  data/fiagro_score.json data/fiagro_score.parquet \
                  data/fatos_relevantes.json data/fatos_relevantes.parquet \
                  data/fii_vacancia.json \
                  data/macro.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos artefatos."
          else
            git commit -m "chore(data): atualiza FII (VP/DY/score) + FIAgro (ingestão mensal)"
            git pull --rebase origin main || true   # evita corrida de push entre workflows
            git push
          fi
