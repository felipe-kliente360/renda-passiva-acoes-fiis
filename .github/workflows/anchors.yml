name: Âncora de escala das ações (yfinance)

# A âncora sharesOutstanding vem do Yahoo, que SÓ é alcançável do runner do GitHub
# (a CVM, ao contrário, não é — ver fetch_anchors.py). Job leve, manual + raro no cron.
# Os fundamentos em si são gerados onde a CVM funciona, lendo o cache que isto commita.
on:
  schedule:
    - cron: "0 5 1 1,4,7,10 *" # 1º dia de jan/abr/jul/out (antes do fundamentos, dia 10)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: anchors
  cancel-in-progress: false

jobs:
  fetch-anchors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências (yfinance)
        run: pip install -r requirements.txt

      - name: Coletar sharesOutstanding da watchlist
        run: python scripts/fetch_anchors.py --out config/shares_anchor.yml

      - name: Commitar âncora atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/shares_anchor.yml
          if git diff --staged --quiet; then
            echo "Sem mudanças na âncora."
          else
            git commit -m "chore(anchors): atualiza sharesOutstanding (yfinance)"
            git pull --rebase origin main || true
            git push
          fi
